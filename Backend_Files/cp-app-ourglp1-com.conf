sserver {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app.ourglp1.com;

    # ✅ SSL setup
    ssl_certificate /etc/letsencrypt/live/app.ourglp1.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.ourglp1.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ✅ Gzip performance
    gzip on;
    gzip_vary on;
    gzip_types text/plain application/javascript text/css application/json image/svg+xml;
    gzip_min_length 256;

    # ✅ MIME types and static root
    include /etc/nginx/mime.types;
    root /var/www/Paris-Clinic/GLP1/frontend/build;

    # ✅ React SPA support
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ✅ Asset fallback (optional but safe)
    location /assets/ {
        try_files $uri $uri/ /index.html;
    }

    # ✅ .env protection (correct)
    location ~* /\.env {
        deny all;
        return 403;
    }

    # ✅ API reverse proxy
    location /api/ {
        proxy_pass http://localhost:3000;  # 👈 Make sure Express is listening on 3000
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_verify off;
         }

    # ✅ Cache control for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ✅ Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy no-referrer-when-downgrade;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ✅ Content Security Policy
    add_header Content-Security-Policy "default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://app.ourglp1.com https://api.ourglp1.com;
        style-src 'self' 'unsafe-inline';
        img-src 'self' https://api.ourglp1.com data: blob:;
        font-src 'self' data:;
        connect-src 'self' https://api.ourglp1.com blob:;
        worker-src 'self' blob:;
        frame-src 'self';";
}

# ✅ HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name app.ourglp1.com;
    return 301 https://$host$request_uri;
}

